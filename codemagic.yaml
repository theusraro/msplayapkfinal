workflows:
  ios-app-store:
    name: MSPlay iOS Build SPM
    max_build_duration: 60
    instance_type: mac_mini_m2

    environment:
      node: 22
      xcode: latest
      vars:
        BUNDLE_ID: "com.theusraro.msplayfinalipa"

    scripts:
      - name: Install dependencies
        script: |
          npm install
          npm install @capacitor/ios @capacitor/assets --save-dev

      - name: Build web app
        script: |
          npm run build

      - name: Create iOS platform with SPM
        script: |
          rm -rf ios
          npx cap add ios --packagemanager SPM

      - name: Generate app icons and splash
        script: |
          npx capacitor-assets generate --ios || true

      - name: Sync Capacitor iOS
        script: |
          npx cap sync ios

      - name: Show iOS files
        script: |
          echo "Listando pasta ios:"
          find ios -maxdepth 4 -type f | sort

      - name: Build iOS unsigned archive
        script: |
          cd ios/App
          xcodebuild \
            -project App.xcodeproj \
            -scheme App \
            -configuration Release \
            -destination generic/platform=iOS \
            clean archive \
            -archivePath build/App.xcarchive \
            CODE_SIGNING_ALLOWED=NO

    artifacts:
      - ios/App/build/**/*.xcarchive
      - /tmp/xcodebuild_logs/*.log
